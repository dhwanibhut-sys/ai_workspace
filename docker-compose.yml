version: '3.8'

services:
  backend:
    build:
      context: ./ai-workspace-backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./ai-workspace-backend/.env
    restart: always

  frontend:
    build:
      context: ./ai-workspace-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
